version: "3.9"

services:
  web:
    build: .
    container_name: django_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./src:/app
      - model_cache:/root/.cache      
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=django_db
      - DB_USER=root
      - DB_PASSWORD=123456
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      #- OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - db
      - qdrant
    restart: unless-stopped


  db:
    image: mysql:8.0
    container_name: django_db
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: django_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant
    container_name: qdrant_db
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  db_data:
  qdrant_data:
  model_cache: