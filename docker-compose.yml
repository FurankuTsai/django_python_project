version: "3.9"

services:
  web:
    build: .
    container_name: django_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./src:/app
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=django_db
      - DB_USER=root
      - DB_PASSWORD=123456
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: django_db
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: django_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  db_data:
